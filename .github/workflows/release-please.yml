name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to build/upload assets for, for example v0.0.1"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || inputs.release_tag != ''
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${{ inputs.release_tag || needs.release-please.outputs.tag_name }}"
          if [ -n "$TAG" ] && [ "${TAG#v}" = "$TAG" ]; then
            TAG="v$TAG"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure manual release tag exists
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --force --tags origin

          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "No Barrier Mouse ${VERSION}" \
              --notes "Manual release for No Barrier Mouse ${VERSION}."
          fi

      - name: Checkout release tag
        if: github.event_name != 'workflow_dispatch' || inputs.release_tag == ''
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo "No release tag was provided or created."
            exit 1
          fi

          git fetch --force --tags origin "refs/tags/${TAG}:refs/tags/${TAG}" || git fetch --force --tags origin

          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Release tag ${TAG} does not exist. If running manually, create the release/tag first or use an existing tag."
            exit 1
          fi

          git checkout --detach "$TAG"

      - name: Build app bundles
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          ./build-app.sh
          ./build-app.sh intel

      - name: Package release assets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            .build/release/NoBarrierMouse.app \
            "NoBarrierMouse-${VERSION}-macOS.zip"

          ditto -c -k --sequesterRsrc --keepParent \
            .build/release/NoBarrierMouse-Intel.app \
            "NoBarrierMouse-${VERSION}-macOS-Intel.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: no-barrier-mouse-macos
          path: |
            NoBarrierMouse-${{ steps.version.outputs.version }}-macOS.zip
            NoBarrierMouse-${{ steps.version.outputs.version }}-macOS-Intel.zip
          if-no-files-found: error

  upload-release-assets:
    needs:
      - release-please
      - build-release-assets
    if: always() && (needs.release-please.outputs.release_created == 'true' || inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Format release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release_tag || needs.release-please.outputs.tag_name }}
        run: |
          marker="<!-- no-barrier-mouse-release-logo -->"
          icon_url="https://raw.githubusercontent.com/${{ github.repository }}/${TAG}/assets/icon.png"
          body="$(gh release view "$TAG" --json body -q .body --repo "${{ github.repository }}")"
          icon_block="$(printf '%s\n%s\n%s' \
            '<p align="center">' \
            "  <img src=\"${icon_url}\" alt=\"No Barrier Mouse icon\" width=\"128\" height=\"128\" />" \
            '</p>')"

          if printf '%s' "$body" | grep -q "$marker"; then
            BODY="$body" ICON_BLOCK="$icon_block" python3 - <<'PY' > /tmp/no-barrier-mouse-release-notes.md
          import os
          import re

          body = os.environ["BODY"]
          icon_block = os.environ["ICON_BLOCK"]
          marker = "<!-- no-barrier-mouse-release-logo -->"
          pattern = re.compile(
              re.escape(marker)
              + r"\s*(?:<p align=\"center\">\s*<img[^>]+No Barrier Mouse icon[^>]+>\s*</p>|!\[No Barrier Mouse icon\]\([^)]+\))",
              re.MULTILINE,
          )
          print(pattern.sub(marker + "\n" + icon_block, body), end="")
          PY
          else
            {
              printf '%s\n' "$marker"
              printf '%s\n\n' "$icon_block"
              printf '%s\n' "$body"
            } > /tmp/no-barrier-mouse-release-notes.md
          fi

          gh release edit "$TAG" --notes-file /tmp/no-barrier-mouse-release-notes.md --repo "${{ github.repository }}"

      - name: Upload app bundles to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release_tag || needs.release-please.outputs.tag_name }}
        run: |
          ls -lh release/
          test "$(find release -type f -name '*.zip' | wc -l)" -eq 2
          gh release upload "$TAG" release/*.zip --repo "${{ github.repository }}" --clobber
